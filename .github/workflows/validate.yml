name: validate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Makefile"
      - "tools/**"
      - "contracts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "Makefile"
      - "tools/**"
      - "contracts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Lampstand validation
        run: make validate
